name: CI/CD Web UI

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'aplicacion-web/**'
      - '.github/workflows/web-ci-cd.yml'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'aplicacion-web/**'
      - '.github/workflows/web-ci-cd.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      publish_report:
        description: 'Publish Web UI Playwright report to GitHub Pages'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: web-report-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-web:
    name: Run Web UI tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck -w aplicacion-web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Web UI tests
        run: npm run test:ci -w aplicacion-web

      - name: Upload Web UI report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-playwright-report
          path: aplicacion-web/playwright-report/
          retention-days: 30

      - name: Publish Web UI report to GitHub Pages
        if: >
          always() &&
          (
            github.event_name == 'workflow_dispatch' && inputs.publish_report ||
            github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
          )
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: aplicacion-web/playwright-report
          destination_dir: web
          keep_files: true
